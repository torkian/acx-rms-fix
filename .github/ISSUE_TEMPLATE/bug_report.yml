name: Bug report
description: A file fails to master, the tool crashes, or output is wrong.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The most valuable thing you can share is a **short audio sample** that reproduces the issue — even 5 seconds of failing audio is enough for us to debug against.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you expect to happen, and what actually happened?
      placeholder: |
        I ran `acx-rms-fix chapter01.mp3` and it crashed with the traceback below.
        I expected it to produce chapter01_ACX.mp3 and print PASS.
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Exact command you ran
      description: Copy and paste — don't retype.
      render: shell
      placeholder: acx-rms-fix -o out/ chapter01.mp3
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Full output
      description: Copy and paste the full terminal output (or the error message from the GUI). Screenshots are harder to work with — please paste text when possible.
      render: shell
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11 / macOS 14.5 / Ubuntu 24.04
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python --version` (or `python3 --version`)
      placeholder: Python 3.12.3
    validations:
      required: true

  - type: input
    id: ffmpeg-version
    attributes:
      label: ffmpeg version
      description: First line of `ffmpeg -version`
      placeholder: ffmpeg version 8.1
    validations:
      required: true

  - type: input
    id: acx-rms-fix-version
    attributes:
      label: acx-rms-fix version
      description: Output of `acx-rms-fix --version`
      placeholder: acx-rms-fix 0.1.0
    validations:
      required: true

  - type: textarea
    id: sample
    attributes:
      label: Sample audio (optional but extremely helpful)
      description: |
        If you can share a short clip that reproduces the problem, drag-and-drop the file into this text box to attach it. Even 2-5 seconds is enough. If the file is private, describe the characteristics instead (duration, approximate RMS, source — ElevenLabs / Audacity / DAW export, etc.).
      placeholder: |
        Attached: sample.mp3 (3 seconds, exported from ElevenLabs at default settings)

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: I'm running the latest release (or main).
          required: true
